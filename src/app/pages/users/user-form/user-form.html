<div class="container">
    <h2>{{ title }}</h2>

    <form (ngSubmit)="enregistrer()">
        <div class="form-group">
            <label>Nom</label>
            <input type="text"
                   placeholder="Entrer le nom"
                   [(ngModel)]="user.nom"
                   name="nom"
                   required>
        </div>

        <div class="form-group">
            <label>Prénom</label>
            <input type="text"
                   placeholder="Entrer le prénom"
                   [(ngModel)]="user.prenom"
                   name="prenom"
                   required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email"
                   placeholder="Entrer l'email"
                   [(ngModel)]="user.email"
                   name="email"
                   required>
        </div>

        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password"
                   placeholder="Entrer le mot de passe"
                   [(ngModel)]="user.password"
                   name="password"
                   [required]="!isEdit">
            <small *ngIf="isEdit">Laissez vide pour garder le mot de passe actuel</small>
        </div>

        <div class="form-group">
            <label>Rôle</label>
            <select [(ngModel)]="user.role" name="role">
                <option value="user">Utilisateur</option>
                <option value="admin">Administrateur</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-save">💾 Enregistrer</button>
            <button type="button" class="btn-cancel" (click)="annuler()">❌ Annuler</button>
        </div>
    </form>
</div>
